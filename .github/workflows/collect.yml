name: collect
on:
  schedule:
    - cron: '17 * * * *'   # de hora em hora (min 17 evita o congestionamento do :00)
  workflow_dispatch: {}      # permite rodar manualmente

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Coletar dados
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}   # opcional: liga acoes BR+US se o secret existir
        run: python3 collector/collect.py
      - name: Commitar dados (se mudaram)
        run: |
          git config user.name "crypto-panel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "sem mudancas — nada a commitar"
          else
            git commit -m "data: snapshot $(date -u +%FT%TZ) [skip ci]"
            git push || (git pull --rebase origin main && git push)
          fi
